services:
  api:
    container_name: tinyiothub-marketplace
    build:
      context: ./api
      dockerfile: Dockerfile
    image: chenguorongz/tinyiothub-marketplace:latest
    ports:
      - "3003:3003"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-dummy}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-dummy}
      - SLED_PATH=/data/marketplace.sled
      - RUST_LOG=info
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
