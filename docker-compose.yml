services:
  api:
    container_name: tinyiothub-marketplace
    build:
      context: ./api
      dockerfile: Dockerfile
    image: chenguorongz/tinyiothub-marketplace:latest
    ports:
      - "3003:3003"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-dummy}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-dummy}
      - SLED_PATH=/data/marketplace.sled
      - RUST_LOG=info
      - REPOS_CONFIG=/app/config/repositories.json
      - LOCAL_DATA_PATH=/app/local-data
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
      - /Users/chenguorong/code/my/tinyiothub-marketplace-repo:/app/local-data:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
